blueprint:
  name: "Project42 Daily Sync"
  description: >
    Syncs your daily health data (steps, distance, calories, heart rate) to
    Project42 automatically at a configurable interval within a time window
    you choose (default: every 30 minutes between 08:00 and 22:00).


    **Before importing this blueprint**, add the following to your
    `configuration.yaml` (only needed once, even for multiple users):

    ```yaml

    rest_command:
      http_post:
        url: "{{ url }}"
        method: POST
        content_type: "application/json"
        payload: "{{ payload }}"

    ```

    Already have a `rest_command:` section? Add only the `http_post:` entry
    inside your existing block — do not create a second `rest_command:` key.


    Then reload HA (Developer Tools → Quick Reload → REST Command) and come
    back to set up this automation.


    **Get your personal webhook URL** from Project42 → Profile → Home Assistant
    → Generate Webhook Token.


    **Find your sensor IDs** in Developer Tools → States, filter by your device
    name (e.g. `iphone_16pro_mirco`).

  domain: automation
  source_url: https://github.com/dhuuk42/Project42Pub/blob/main/project42_blueprint.yaml

  input:
    webhook_url:
      name: Project42 Webhook URL
      description: >
        Your personal URL from Project42 → Profile → Home Assistant.
        Looks like: https://huukdev.de/api/webhooks/ha/abc123...
      selector:
        text:
          type: url

    steps_sensor:
      name: Steps Sensor
      description: >
        Daily step count. Find it in Developer Tools → States, filter by your
        device name and look for "steps".
        Example: sensor.iphone_16pro_mirco_steps
      selector:
        entity:
          domain: sensor

    distance_sensor:
      name: Distance Sensor (optional)
      description: >
        Walking + running distance reported in meters by the iOS companion app.
        Example: sensor.iphone_16pro_mirco_distance
        Leave empty if not available.
      default: ""
      selector:
        entity:
          domain: sensor

    floors_sensor:
      name: Floors Climbed Sensor (optional)
      description: >
        Floors ascended. Example: sensor.iphone_16pro_mirco_floors_ascended
        Leave empty if not available.
      default: ""
      selector:
        entity:
          domain: sensor

    calories_sensor:
      name: Active Calories Sensor (optional, Apple Watch only)
      description: >
        Active energy burned. Only available with Apple Watch.
        Example: sensor.iphone_mirco_active_energy
        Leave empty if you don't have an Apple Watch.
      default: ""
      selector:
        entity:
          domain: sensor

    heart_rate_sensor:
      name: Heart Rate Sensor (optional, Apple Watch only)
      description: >
        Resting or average heart rate. Only available with Apple Watch.
        Example: sensor.iphone_mirco_heart_rate
        Leave empty if you don't have an Apple Watch.
      default: ""
      selector:
        entity:
          domain: sensor

    sync_interval:
      name: Sync interval
      description: >
        How often to push data within the active time window.
        Minimum is every 15 minutes — syncing more often won't produce fresher
        data as health sensors don't update that quickly.
      default: "/30"
      selector:
        select:
          options:
            - label: "Every 15 minutes"
              value: "/15"
            - label: "Every 20 minutes"
              value: "/20"
            - label: "Every 30 minutes (recommended)"
              value: "/30"
            - label: "Every hour"
              value: "0"

    window_start:
      name: Active window — start
      description: Syncing begins at this time each day.
      default: "08:00:00"
      selector:
        time:

    window_end:
      name: Active window — end
      description: Syncing stops at this time each day.
      default: "22:00:00"
      selector:
        time:

variables:
  steps_id: !input steps_sensor
  distance_id: !input distance_sensor
  floors_id: !input floors_sensor
  calories_id: !input calories_sensor
  hr_id: !input heart_rate_sensor

trigger:
  - platform: time_pattern
    minutes: !input sync_interval

condition:
  - condition: time
    after: !input window_start
    before: !input window_end

action:
  - service: rest_command.http_post
    data:
      url: !input webhook_url
      payload: >
        {
          "steps": {{ states(steps_id) | int(0) }},
          "distance_m": {{ states(distance_id) | float(0) | round(0) if distance_id != "" else "null" }},
          "floors": {{ states(floors_id) | int(0) if floors_id != "" else "null" }},
          "active_calories": {{ states(calories_id) | float(0) | round(1) if calories_id != "" else "null" }},
          "heart_rate": {{ states(hr_id) | int(0) if hr_id != "" else "null" }},
          "date": "{{ now().strftime('%Y-%m-%d') }}"
        }
